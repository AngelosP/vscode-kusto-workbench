<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Kusto Workbench Viewer</title>
	<style>
		*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
		html, body { height: 100%; overflow: hidden; background: #1e1e1e; }
		iframe { width: 100%; height: 100%; border: none; display: block; }
		@media (prefers-color-scheme: light) {
			body { background: #ffffff; }
		}
	</style>
</head>
<body>
	<iframe id="viewer" src="viewer.html"></iframe>
	<!-- Must be an external script: MV3 extension pages block inline scripts (CSP: script-src 'self') -->
	<script src="viewer-standalone-boot.js"></script>
</body>
</html>
