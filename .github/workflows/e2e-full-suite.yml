name: e2e-default-suite

on:
  workflow_dispatch:
    inputs:
      includeScreenshotGenerators:
        description: 'Include README screenshot generator features'
        required: false
        default: 'false'
      vscodeExtTestPackage:
        description: 'vscode-ext-test npm tarball URL'
        required: false
        default: 'https://github.com/AngelosP/vscode-extension-tester/releases/download/v0.1.0/vscode-ext-test-0.1.0.tgz'
  schedule:
    - cron: '0 4 * * *'

permissions:
  contents: read

jobs:
  default-suite:
    name: Default Profile E2E Suite
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install vscode-ext-test CLI
        shell: pwsh
        env:
          VSCODE_EXT_TEST_PACKAGE: ${{ github.event.inputs.vscodeExtTestPackage || 'https://github.com/AngelosP/vscode-extension-tester/releases/download/v0.1.0/vscode-ext-test-0.1.0.tgz' }}
        run: |
          npm install -g $env:VSCODE_EXT_TEST_PACKAGE
          $command = Get-Command vscode-ext-test -ErrorAction Stop
          Write-Host "vscode-ext-test path: $($command.Source)"
          vscode-ext-test --version

      - name: Run default-profile E2E suite
        shell: pwsh
        env:
          E2E_INCLUDE_SCREENSHOTS: ${{ github.event.inputs.includeScreenshotGenerators || 'false' }}
        run: |
          $arguments = @('--profiles', 'default')
          if ($env:E2E_INCLUDE_SCREENSHOTS -eq 'true') {
            $arguments += '--include-screenshot-generators'
          }
          node scripts/e2e-full-suite.mjs @arguments

      - name: Upload E2E signal artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-default-suite-${{ github.run_number }}
          if-no-files-found: ignore
          retention-days: 30
          path: |
            tests/vscode-extension-tester/history/**
            tests/vscode-extension-tester/runs/**
            tests/vscode-extension-tester/results/**