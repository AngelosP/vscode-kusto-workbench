name: e2e-default-suite

on:
  workflow_dispatch:
    inputs:
      includeScreenshotGenerators:
        description: 'Include README screenshot generator features'
        required: false
        default: 'false'
      vscodeExtTestPackage:
        description: 'vscode-ext-test npm tarball URL, or latest'
        required: false
        default: 'latest'
  schedule:
    - cron: '0 4 * * *'

permissions:
  contents: read

jobs:
  default-suite:
    name: Default Profile E2E Suite
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install vscode-ext-test CLI
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VSCODE_EXT_TEST_PACKAGE: ${{ github.event.inputs.vscodeExtTestPackage || 'latest' }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $package = [string]$env:VSCODE_EXT_TEST_PACKAGE
          if ([string]::IsNullOrWhiteSpace($package) -or $package -eq 'latest') {
            $headers = @{
              Accept = 'application/vnd.github+json'
              'X-GitHub-Api-Version' = '2022-11-28'
            }
            if (-not [string]::IsNullOrWhiteSpace($env:GITHUB_TOKEN)) {
              $headers.Authorization = "Bearer $env:GITHUB_TOKEN"
            }

            $release = Invoke-RestMethod -Uri 'https://api.github.com/repos/AngelosP/vscode-extension-tester/releases/latest' -Headers $headers -TimeoutSec 30
            $asset = @($release.assets) |
              Where-Object { [string]$_.name -match '^vscode-ext-test-\d+\.\d+\.\d+\.tgz$' } |
              Select-Object -First 1
            if (-not $asset) {
              throw "Latest vscode-extension-tester release '$($release.tag_name)' does not contain a vscode-ext-test .tgz asset."
            }

            $package = [string]$asset.browser_download_url
            "Resolved vscode-ext-test latest release: $($release.tag_name) ($($asset.name))" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            Write-Host "Resolved vscode-ext-test latest release: $($release.tag_name) ($($asset.name))"
          } else {
            Write-Host "Using requested vscode-ext-test package: $package"
          }

          npm install -g $package
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          $command = Get-Command vscode-ext-test -ErrorAction Stop
          Write-Host "vscode-ext-test path: $($command.Source)"
          vscode-ext-test --version

      - name: Resolve latest stable VS Code
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $packageJson = Get-Content -Raw package.json | ConvertFrom-Json
          $engineRange = [string]$packageJson.engines.vscode
          $minimumEngine = ($engineRange -replace '^[\^~>=<\s]*', '').Trim()
          if ($minimumEngine -notmatch '^\d+\.\d+\.\d+$') {
            throw "Unable to parse package.json engines.vscode minimum from '$engineRange'"
          }

          $releaseUri = 'https://update.code.visualstudio.com/api/releases/stable?released=true'
          $response = Invoke-RestMethod -Uri $releaseUri -TimeoutSec 30
          $versions = @($response) |
            ForEach-Object { [string]$_ } |
            Where-Object { $_ -match '^\d+\.\d+\.\d+$' } |
            Sort-Object { [version]$_ } -Descending

          $latest = $versions | Select-Object -First 1
          if (-not $latest) {
            throw "No stable VS Code versions were returned from $releaseUri"
          }
          if ([version]$latest -lt [version]$minimumEngine) {
            throw "Resolved VS Code $latest is below extension engine minimum $minimumEngine"
          }

          "E2E_VSCODE_VERSION=$latest" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "Resolved latest stable VS Code: $latest" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          Write-Host "Resolved latest stable VS Code: $latest"

      - name: Run default-profile E2E suite
        shell: pwsh
        env:
          E2E_INCLUDE_SCREENSHOTS: ${{ github.event.inputs.includeScreenshotGenerators || 'false' }}
        run: |
          $arguments = @('--profiles', 'default', '--vscode-version', $env:E2E_VSCODE_VERSION)
          if ($env:E2E_INCLUDE_SCREENSHOTS -eq 'true') {
            $arguments += '--include-screenshot-generators'
          }
          node scripts/e2e-full-suite.mjs @arguments

      - name: Upload E2E signal artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-default-suite-${{ github.run_number }}
          if-no-files-found: ignore
          retention-days: 30
          path: |
            tests/vscode-extension-tester/history/**
            tests/vscode-extension-tester/runs/**
            tests/vscode-extension-tester/results/**