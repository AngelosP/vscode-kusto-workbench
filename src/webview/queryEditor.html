<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Kusto Query Editor</title>
	<link rel="stylesheet" href="{{monacoCssUri}}">
	<style>{{appCssInline}}{{alternatingRowStyle}}</style>
</head>

<body>
	<div id="queries-container"></div>
	<kw-section-reorder-popup id="sectionReorderPopup"></kw-section-reorder-popup>
	<div class="add-controls" role="group" aria-label="Add sections">
		<span class="add-controls-label">Add</span>
		<span class="add-controls-options">
			<button class="add-control-btn" data-add-kind="query">Kusto</button>
			<button class="add-control-btn" data-add-kind="sql">SQL</button>
			<button class="add-control-btn" data-add-kind="chart">Chart</button>
			<button class="add-control-btn" data-add-kind="transformation">Transformation</button>
			<button class="add-control-btn" data-add-kind="python">Python</button>
			<button class="add-control-btn" data-add-kind="url">URL</button>
			<button class="add-control-btn" data-add-kind="html">HTML</button>
			<button class="add-control-btn" data-add-kind="markdown">Markdown</button>
		</span>
		<!-- Mobile dropdown for narrow widths -->
		<div class="add-controls-dropdown">
			<button type="button" class="add-control-btn add-controls-dropdown-btn" id="addSectionDropdownBtn" aria-haspopup="listbox" aria-expanded="false">
				Section
				<svg class="add-controls-dropdown-caret" width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M7.976 10.072l4.357-4.357.62.618L8.284 11h-.618L3 6.333l.619-.618 4.357 4.357z" fill="currentColor"/></svg>
			</button>
			<div class="add-controls-dropdown-menu" id="addSectionDropdownMenu" role="listbox" style="display:none;">
				<div class="add-controls-dropdown-item" role="option" data-add-kind="query">Kusto</div>
				<div class="add-controls-dropdown-item" role="option" data-add-kind="sql">SQL</div>
				<div class="add-controls-dropdown-item" role="option" data-add-kind="chart">Chart</div>
				<div class="add-controls-dropdown-item" role="option" data-add-kind="transformation">Transformation</div>
				<div class="add-controls-dropdown-item" role="option" data-add-kind="python">Python</div>
				<div class="add-controls-dropdown-item" role="option" data-add-kind="url">URL</div>
				<div class="add-controls-dropdown-item" role="option" data-add-kind="html">HTML</div>
				<div class="add-controls-dropdown-item" role="option" data-add-kind="markdown">Markdown</div>
			</div>
		</div>
	</div>
	<div class="repo-issues-link" role="note" aria-label="Feedback">
		<a class="repo-issues-anchor" href="https://github.com/AngelosP/vscode-kusto-workbench/issues" target="_blank" rel="noopener noreferrer">Ask for a fix or feature</a>
	</div>

	<!-- Object Viewer Modal -->
	<div id="objectViewer" class="object-viewer-modal" onclick="closeObjectViewer(event)">
		<div class="object-viewer-content" onclick="event.stopPropagation()">
			<div class="object-viewer-header">
				<h3 id="objectViewerTitle"></h3>
				<div class="object-viewer-search">
					<div id="objectViewerSearchHost"></div>
					<span class="object-viewer-search-results" id="objectViewerSearchResults"></span>
				</div>
				<button class="unified-btn-secondary unified-btn-icon-only refresh-btn close-btn object-viewer-close" type="button" onclick="closeObjectViewer()" title="Close" aria-label="Close">
					<svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg">
						<path d="M4 4l8 8" />
						<path d="M12 4L4 12" />
					</svg>
				</button>
			</div>
			<div class="object-viewer-body">
				<div class="object-viewer-section object-viewer-props-section">
					<div class="object-viewer-section-header">
						<button id="objectViewerBackBtn" class="unified-btn-secondary tool-toggle-btn object-viewer-back-btn" type="button" onclick="objectViewerNavigateBack()" title="Back" aria-label="Back" style="display:none;">←</button>
						<div class="object-viewer-section-title" id="objectViewerPropsTitle"></div>
					</div>
					<table class="object-viewer-props-table" id="objectViewerPropsTable" aria-label="Properties"></table>
				</div>

				<div class="object-viewer-section object-viewer-raw-section">
					<div class="object-viewer-section-header">
						<div class="object-viewer-section-title">Raw value</div>
						<div class="object-viewer-raw-actions">
							<button id="objectViewerRawCopy" class="unified-btn-secondary tool-toggle-btn object-viewer-raw-copy" type="button" onclick="copyObjectViewerRawToClipboard()" title="Copy to clipboard" aria-label="Copy to clipboard"></button>
							<button id="objectViewerRawToggle" class="unified-btn-secondary tool-toggle-btn object-viewer-raw-toggle" type="button" onclick="toggleObjectViewerRaw()" title="Hide raw value" aria-label="Hide raw value"></button>
						</div>
					</div>
					<div id="objectViewerRawBody" class="object-viewer-raw-body">
						<div id="objectViewerContent" class="object-viewer-json object-viewer-json-wrap"></div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Cell Viewer Modal -->
	<div id="cellViewer" class="cell-viewer-modal" onclick="closeCellViewer(event)">
		<div class="cell-viewer-content" onclick="event.stopPropagation()">
			<div class="cell-viewer-header">
				<h3 id="cellViewerTitle"></h3>
				<div class="cell-viewer-search">
					<div id="cellViewerSearchHost"></div>
				</div>
				<div class="cell-viewer-actions">
					<button id="cellViewerCopy" class="unified-btn-secondary tool-toggle-btn cell-viewer-copy" type="button" onclick="copyCellViewerToClipboard()" title="Copy to clipboard" aria-label="Copy to clipboard"></button>
				</div>
				<button class="unified-btn-secondary unified-btn-icon-only refresh-btn close-btn cell-viewer-close" type="button" onclick="closeCellViewer()" title="Close" aria-label="Close">
					<svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg">
						<path d="M4 4l8 8" />
						<path d="M12 4L4 12" />
					</svg>
				</button>
			</div>
			<div class="cell-viewer-body">
				<div id="cellViewerContent" class="cell-viewer-value"></div>
			</div>
		</div>
	</div>

	<!-- Diff View (Lit component) -->
	<kw-diff-view></kw-diff-view>

	<!-- Share Modal -->
	<div id="shareModal" class="share-modal">
		<div class="share-modal-content" id="shareModalContent">
			<div class="share-modal-header">
				<h3 id="shareModal_title">Share</h3>
				<button class="unified-btn-secondary unified-btn-icon-only refresh-btn close-btn share-modal-close" type="button" id="shareModalCloseBtn" title="Close" aria-label="Close">
					<svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg">
						<path d="M4 4l8 8" />
						<path d="M12 4L4 12" />
					</svg>
				</button>
			</div>
			<div class="share-modal-body">
				<div class="share-modal-description">Select what to include when sharing. Content is formatted for Teams and other rich-text destinations.</div>
				<label class="share-modal-option" id="shareModal_label_title">
					<input type="checkbox" id="shareModal_chk_title" checked />
					<div class="share-modal-option-text">
						<span class="share-modal-option-name">Title</span>
						<span class="share-modal-option-subtitle" id="shareModal_link_subtitle">Includes a direct link to the query (opens in Azure Data Explorer)</span>
					</div>
				</label>
				<label class="share-modal-option" id="shareModal_label_query">
					<input type="checkbox" id="shareModal_chk_query" checked />
					<div class="share-modal-option-text">
						<span class="share-modal-option-name">Query</span>
						<span class="share-modal-option-subtitle">KQL code block</span>
					</div>
				</label>
				<label class="share-modal-option" id="shareModal_label_results">
					<input type="checkbox" id="shareModal_chk_results" checked />
					<div class="share-modal-option-text">
						<span class="share-modal-option-name">Results</span>
						<span class="share-modal-option-subtitle" id="shareModal_results_subtitle">Formatted as a table</span>
						<span class="share-modal-row-limit" id="shareModal_rowLimitGroup">Include
							<input type="number" id="shareModal_rowLimit" min="1" value="10" class="share-modal-row-limit-input" onclick="event.stopPropagation();" />
							<span id="shareModal_rowLimitTotal">of 28 rows</span>
						</span>
					</div>
				</label>
			</div>
			<div class="share-modal-footer">
				<button class="unified-btn-primary share-modal-copy-btn" type="button" id="shareModalCopyBtn">Copy to clipboard</button>
			</div>
		</div>
	</div>

	<script src="{{monacoLoaderUri}}"></script>
	<script>
		window.__kustoQueryEditorConfig = {
			monacoVsUri: "{{monacoVsUri}}",
			monacoLoaderUri: "{{monacoLoaderUri}}",
			cacheBuster: "{{cacheBuster}}",
			copilotLogoUri: "{{copilotLogoUri}}",
			echartsUrl: "{{echartsUrl}}",
			toastUiEditorUrl: "{{toastUiEditorUrl}}",
			toastUiCssUrls: {{toastUiCssUrlsJson}}
		};

		// Monaco web workers run from blob: URLs in VS Code webviews. In VS Code
		// 1.118, importing vscode-resource scripts directly from that blob worker
		// can fail, so fetch worker scripts on the webview thread and let the
		// worker's importScripts() read them from an in-memory map.
		(function () {
			var baseUrl = "{{monacoVsUri}}".replace(/\/vs\/?$/, '/');
			var cacheBuster = "{{cacheBuster}}";
			var workerMainPath = "vs/base/worker/workerMain.js";
			var workerScriptPathsByLabel = {
				kusto: [
					"vs/language/kusto/kustoWorker.js",
					"vs/language/kusto/main-f8f8d919.js",
					"vs/language/kusto/schema-d1f6d06d.js",
					"vs/language/kusto/bridge.min.js",
					"vs/language/kusto/kusto.javascript.client.min.js",
					"vs/language/kusto/newtonsoft.json.min.js",
					"vs/language/kusto/Kusto.Language.Bridge.min.js"
				],
				html: ["vs/language/html/htmlWorker.js"]
			};
			var workerScriptTextPromises = Object.create(null);

			function withCacheBuster(url) {
				if (!cacheBuster) return url;
				return url + (url.indexOf('?') >= 0 ? '&' : '?') + 'v=' + encodeURIComponent(cacheBuster);
			}

			function toWorkerScriptUrl(path) {
				return baseUrl + path;
			}

			function fetchWorkerScript(path) {
				return fetch(withCacheBuster(toWorkerScriptUrl(path)))
					.then(function (response) {
						if (!response.ok) {
							throw new Error('HTTP ' + response.status + ' while loading Monaco worker script ' + path);
						}
						return response.text();
					});
			}

			function normalizeWorkerLabel(label) {
				var value = String(label || '').toLowerCase();
				if (value === 'kusto' || value === 'kql') return 'kusto';
				if (value === 'html' || value === 'handlebars' || value === 'razor') return 'html';
				return 'editor';
			}

			function getWorkerScripts(label) {
				var normalizedLabel = normalizeWorkerLabel(label);
				if (!workerScriptTextPromises[normalizedLabel]) {
					var paths = [workerMainPath].concat(workerScriptPathsByLabel[normalizedLabel] || []);
					workerScriptTextPromises[normalizedLabel] = Promise.all(paths.map(function (path) {
						return fetchWorkerScript(path).then(function (text) {
							return { path: path, text: text };
						});
					})).then(function (entries) {
						var scripts = Object.create(null);
						entries.forEach(function (entry) { scripts[entry.path] = entry.text; });
						return scripts;
					});
				}
				return workerScriptTextPromises[normalizedLabel];
			}

			function buildWorkerSource(label, scripts) {
				var workerMainText = scripts[workerMainPath];
				var moduleScripts = Object.create(null);
				Object.keys(scripts).forEach(function (path) {
					if (path !== workerMainPath) moduleScripts[path] = scripts[path];
				});

				return [
					'(function () {',
					'  var baseUrl = ' + JSON.stringify(baseUrl) + ';',
					'  var workerLabel = ' + JSON.stringify(String(label || 'editor')) + ';',
					'  var scriptTexts = ' + JSON.stringify(moduleScripts) + ';',
					'  var workerMainText = ' + JSON.stringify(workerMainText) + ';',
					'  var originalImportScripts = typeof importScripts === "function" ? importScripts.bind(self) : null;',
					'  function normalizeScriptKey(url) {',
					'    var value = String(url || "");',
					'    try { value = new URL(value, baseUrl).toString(); } catch (err) {}',
					'    var queryIndex = value.search(/[?#]/);',
					'    if (queryIndex >= 0) value = value.slice(0, queryIndex);',
					'    var cleanBaseUrl = String(baseUrl).replace(/[?#].*$/, "");',
					'    if (value.indexOf(cleanBaseUrl) === 0) value = value.slice(cleanBaseUrl.length);',
					'    var distMarker = "/dist/monaco/";',
					'    var distIndex = value.indexOf(distMarker);',
					'    if (distIndex >= 0) value = value.slice(distIndex + distMarker.length);',
					'    return value.replace(/^\\/+/, "");',
					'  }',
					'  function runWorkerScript(url, text) {',
					'    (0, eval)(text + "\\n//# sourceURL=" + url);',
					'  }',
					'  self.MonacoEnvironment = self.MonacoEnvironment || {};',
					'  self.MonacoEnvironment.baseUrl = baseUrl;',
					'  self.importScripts = function () {',
					'    for (var i = 0; i < arguments.length; i++) {',
					'      var url = String(arguments[i]);',
					'      var key = normalizeScriptKey(url);',
					'      var text = scriptTexts[key];',
					'      if (typeof text === "string") {',
					'        runWorkerScript(url, text);',
					'      } else if (originalImportScripts) {',
					'        originalImportScripts(url);',
					'      } else {',
					'        throw new Error("Monaco worker script not embedded for " + workerLabel + ": " + url + " (" + key + ")");',
					'      }',
					'    }',
					'  };',
					'  runWorkerScript(baseUrl + "vs/base/worker/workerMain.js", workerMainText);',
					'})();'
				].join('\n');
			}

			function createMonacoWorker(label) {
				return getWorkerScripts(label).then(function (scripts) {
					var source = buildWorkerSource(label, scripts);
					var blobUrl = URL.createObjectURL(new Blob([source], { type: 'text/javascript' }));
					var worker = new Worker(blobUrl, { name: String(label || 'monaco') });
					setTimeout(function () {
						try { URL.revokeObjectURL(blobUrl); } catch (err) { console.error('[Kusto Workbench] Failed to revoke Monaco worker blob URL', err); }
					}, 30000);
					return worker;
				});
			}

			window.MonacoEnvironment = {
				getWorker: function (_workerId, label) {
					return createMonacoWorker(label);
				},
				getWorkerUrl: function () {
					return toWorkerScriptUrl(workerMainPath);
				}
			};
		})();
	</script>
	<script src="{{queryEditorJsUri}}"></script>
</body>

</html>
